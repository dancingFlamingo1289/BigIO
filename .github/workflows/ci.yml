name: BigIO Continuous Integration

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Quality Check with Maven
        run: mvn -B verify

      - name: Upload Analysis Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: target/site/
          